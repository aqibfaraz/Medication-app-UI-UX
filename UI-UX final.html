<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MSS – Ritual, Curated</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C8A96E;
    --gold-light: #D4B97E;
    --gold-dark: #A8894E;
    --dark: #1A1714;
    --dark2: #221E1A;
    --dark3: #2A2520;
    --text: #E8E0D4;
    --text-muted: #9A9085;
    --card-bg: rgba(40, 35, 28, 0.85);
  }

  html, body {
    width: 100%;
    min-height: 100%;
    background: #0F0D0B;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Jost', sans-serif;
    overflow: hidden;
  }

  /* ── PHONE SHELL ── */
  .phone {
    width: min(calc(100vw - 24px), 390px);
    height: min(calc(100svh - 24px), 844px);
    background: var(--dark);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 40px 120px rgba(0,0,0,0.9),
      inset 0 0 0 1px rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: max(14px, env(safe-area-inset-top)) 24px 0;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .status-time {
    font-family: 'Jost', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: #ffffff;
    letter-spacing: 0.02em;
  }

  .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .status-icons svg {
    fill: #ffffff;
    stroke: #ffffff;
    opacity: 0.95;
  }

  /* ── HERO BACKGROUND ── */
  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: url('image1-Picsart-AiImageEnhancer.jpeg') center center / cover no-repeat;
  }

  .hero-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 75%, rgba(120, 80, 30, 0.45) 0%, transparent 70%),
      radial-gradient(ellipse 100% 60% at 50% 100%, rgba(80, 50, 15, 0.6) 0%, transparent 60%),
      linear-gradient(180deg, rgba(20,16,12,0.5) 0%, rgba(15,12,8,0.2) 40%, rgba(10,8,5,0.7) 80%, rgba(8,6,3,0.95) 100%);
    z-index: 2;
  }

  /* Dark foliage overlay */
  .foliage-overlay {
    position: absolute;
    top: 0; right: -20px;
    width: 200px; height: 300px;
    z-index: 4;
    opacity: 0.8;
  }

  /* ── CONTENT LAYER ── */
  .content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 0 28px;
  }

  /* Logo */
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(20px, 4vw, 22px);
    color: var(--gold);
    letter-spacing: 0.25em;
    margin-top: clamp(20px, 4vw, 34px);
    margin-bottom: 0;
  }

  /* Headline */
  .headline-block {
    margin-top: clamp(8px, 2.5vw, 14px);
  }

  .headline-line1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(46px, 12vw, 58px);
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1;
    display: block;
  }

  .headline-line2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(46px, 12vw, 58px);
    color: var(--gold);
    letter-spacing: -0.01em;
    line-height: 1;
    display: block;
  }

  .divider-line {
    width: 36px;
    height: 1px;
    background: var(--gold);
    margin: 8px 0;
    opacity: 0.7;
  }

  .tagline {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 15px;
    color: rgba(232, 224, 212, 0.85);
    line-height: 1.45;
    max-width: 250px;
  }

  .tagline em {
    font-style: italic;
    color: var(--text);
  }

  /* Spacer pushes buttons to bottom */
  .spacer { flex: 1; }

  /* ── BOTTOM SECTION ── */
  .bottom-section {
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }

  .btn-primary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 19px 24px;
    background: var(--gold);
    border-radius: 100px;
    border: none;
    cursor: pointer;
    margin-bottom: 20px;
    transition: background 0.2s, transform 0.15s;
    text-decoration: none;
  }

  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-primary-text {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 16px;
    color: #1A1410;
    letter-spacing: 0.03em;
  }

  .btn-arrow {
    width: 20px;
    height: 20px;
    color: #1A1410;
  }

  .btn-ghost {
    display: block;
    text-align: left;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 14px;
    color: rgba(232, 224, 212, 0.55);
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: color 0.2s;
    text-decoration: none;
  }

  .btn-ghost:hover { color: rgba(232, 224, 212, 0.85); }

  /* ── HOME INDICATOR ── */
  .home-indicator {
    position: absolute;
    bottom: max(8px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.25);
    border-radius: 3px;
    z-index: 10;
  }

  /* ── ENTRANCE ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo { animation: fadeUp 0.8s ease forwards; }
  .headline-block { animation: fadeUp 0.8s 0.15s ease both; }
  .divider-line { animation: fadeUp 0.6s 0.3s ease both; }
  .tagline { animation: fadeUp 0.8s 0.35s ease both; }
  .btn-primary { animation: fadeUp 0.8s 0.5s ease both; }
  .btn-ghost { animation: fadeUp 0.8s 0.6s ease both; }

  /* ── OUTER DESKTOP WRAPPER ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(80,50,20,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  @media (max-width: 480px) {
    html, body {
      align-items: stretch;
      background: #0B0908;
    }

    .phone {
      width: 100vw;
      height: 100svh;
      border-radius: 0;
      box-shadow: none;
    }

    .content {
      padding: 0 22px;
    }

    .status-bar {
      padding-left: 20px;
      padding-right: 20px;
    }

    .logo {
      margin-top: 34px;
    }

    .headline-block {
      margin-top: 18px;
    }

    .tagline {
      max-width: 220px;
    }

    .bottom-section {
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
    }
  }
</style>
</head>
<body>

<div class="phone">

  <!-- Background glow -->
  <div class="hero-bg">
    <!-- Dark foliage top-right -->
    <svg class="foliage-overlay" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
      <path d="M100,0 Q180,40 160,100 Q200,80 190,150 Q220,120 200,200 Q180,160 160,200 Q190,240 170,300 L200,300 L200,0 Z" fill="#0D1208" opacity="0.9"/>
      <path d="M140,0 Q200,30 185,90 Q210,70 200,140" fill="#111A0A" opacity="0.8"/>
      <!-- Leaves -->
      <ellipse cx="165" cy="60" rx="35" ry="15" fill="#0F1A0A" transform="rotate(-30,165,60)" opacity="0.85"/>
      <ellipse cx="180" cy="120" rx="30" ry="12" fill="#0D180A" transform="rotate(-20,180,120)" opacity="0.8"/>
      <ellipse cx="170" cy="180" rx="28" ry="11" fill="#0F1A0A" transform="rotate(-35,170,180)" opacity="0.75"/>
      <ellipse cx="185" cy="240" rx="25" ry="10" fill="#0D1808" transform="rotate(-15,185,240)" opacity="0.7"/>
    </svg>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <!-- Signal -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#ffffff"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5"/><rect x="9" y="3" width="3" height="9" rx="0.5"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>
      <!-- Wifi -->
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 10 L8 10" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none"/><path d="M5,7.5 Q8,5 11,7.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none"/><path d="M2.5,5 Q8,1 13.5,5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2.5" stroke="#ffffff" stroke-width="1.2" fill="none"/><rect x="21.5" y="3.5" width="2.5" height="5" rx="1" fill="#ffffff" opacity="0.7"/><rect x="1.5" y="2.5" width="16" height="7" rx="1.5" fill="#ffffff"/></svg>
    </div>
  </div>

  <!-- Main content -->
  <div class="content">
    <div class="logo">MSS</div>

    <div class="headline-block">
      <span class="headline-line1">Ritual,</span>
      <span class="headline-line2">curated.</span>
    </div>

    <div class="divider-line"></div>

    <p class="tagline">
      Step into a space of intention, where emotion, presence, and <em>self-reflection</em> meet.
    </p>

    <div class="spacer"></div>

    <div class="bottom-section">
      <a href="#" class="btn-primary">
        <span class="btn-primary-text">Begin Your Journey</span>
        <svg class="btn-arrow" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="#1A1410" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <a href="#" class="btn-ghost">Enter quietly</a>
    </div>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator"></div>

</div>

</body>
</html>
